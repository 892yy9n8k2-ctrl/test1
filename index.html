let correctTotal = 0, wrongTotal = 0;

const qNumber = document.getElementById('qNumber');
const qText = document.getElementById('qText');
const optionsContainer = document.getElementById('optionsContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const resetBtn = document.getElementById('resetBtn');
const restartBtn = document.getElementById('restartBtn');
const progressFill = document.getElementById('progressFill');
const questionCounter = document.getElementById('questionCounter');
const correctCountSpan = document.getElementById('correctCount');
const wrongCountSpan = document.getElementById('wrongCount');
const remainingCountSpan = document.getElementById('remainingCount');
const questionBlock = document.getElementById('questionBlock');
const resultBox = document.getElementById('resultBox');
const finalScore = document.getElementById('finalScore');
const finalDetail = document.getElementById('finalDetail');
const finalCorrect = document.getElementById('finalCorrect');
const finalWrong = document.getElementById('finalWrong');
const finalTotal = document.getElementById('finalTotal');

function renderQuestion(index) {
    const q = questions[index];
    qNumber.textContent = `Вопрос #${q.id}`;
    qText.textContent = q.text;
    const letters = ['а', 'б', 'в', 'г'];
    let html = '';
    for (let i = 0; i < q.options.length; i++) {
        let className = 'option';
        const selected = answers[index];
        if (selected !== null) {
            className += ' disabled';
            if (i === q.correct) className += ' show-correct';
            if (i === selected && i === q.correct) className += ' selected-correct';
            if (i === selected && i !== q.correct) className += ' selected-wrong';
        }
        html += `<div class="${className}" data-optindex="${i}"><span class="letter">${letters[i]})</span> ${q.options[i]}</div>`;
    }
    optionsContainer.innerHTML = html;
    if (answers[index] === null) {
        document.querySelectorAll('.option').forEach(el => {
            el.addEventListener('click', function() {
                selectOption(index, parseInt(this.dataset.optindex));
            });
        });
    }
    updateStats();
    updateProgress();
    prevBtn.disabled = (index === 0);
    nextBtn.textContent = (index === questions.length - 1) ? '📊 Завершить' : 'Вперёд ▶';
}

function selectOption(qIndex, optIndex) {
    if (answers[qIndex] !== null) return;
    answers[qIndex] = optIndex;
    recalcStats();
    renderQuestion(currentIndex);
    if (answers.every(a => a !== null)) setTimeout(showResult, 500);
}

function recalcStats() {
    correctTotal = 0; wrongTotal = 0;
    for (let i = 0; i < questions.length; i++) {
        const ans = answers[i];
        if (ans === null) continue;
        if (ans === questions[i].correct) correctTotal++; else wrongTotal++;
    }
}

function updateStats() {
    const answered = answers.filter(a => a !== null).length;
    correctCountSpan.textContent = correctTotal;
    wrongCountSpan.textContent = wrongTotal;
    remainingCountSpan.textContent = questions.length - answered;
    questionCounter.textContent = `Вопрос ${currentIndex + 1} / ${questions.length}`;
}

function updateProgress() {
    const answered = answers.filter(a => a !== null).length;
    progressFill.style.width = (answered / questions.length * 100) + '%';
}

function showResult() {
    questionBlock.style.display = 'none';
    resultBox.classList.add('show');
    const pct = Math.round((correctTotal / questions.length) * 100);
    finalScore.textContent = pct + '%';
    finalCorrect.textContent = correctTotal;
    finalWrong.textContent = wrongTotal;
    finalTotal.textContent = questions.length;
    let grade = '';
    if (pct >= 90) grade = '🏆 Отлично! Вы полностью готовы к экзамену!';
    else if (pct >= 75) grade = '✅ Хорошо! Повторите сложные темы.';
    else if (pct >= 60) grade = '📖 Удовлетворительно. Рекомендуем дополнительную подготовку.';
    else grade = '📚 Требуется серьёзная подготовка. Пройдите тест заново.';
    finalDetail.textContent = grade;
}

function resetTest() {
    answers = new Array(questions.length).fill(null);
    correctTotal = 0; wrongTotal = 0;
    currentIndex = 0;
    questionBlock.style.display = 'block';
    resultBox.classList.remove('show');
    renderQuestion(0);
}

prevBtn.addEventListener('click', function() {
    if (currentIndex > 0) { currentIndex--; renderQuestion(currentIndex); }
});

nextBtn.addEventListener('click', function() {
    if (answers[currentIndex] === null) {
        alert('⚠️ Сначала выберите ответ на текущий вопрос!');
        return;
    }
    if (currentIndex === questions.length - 1) {
        if (answers.every(a => a !== null)) showResult();
        else {
            const firstUnanswered = answers.indexOf(null);
            if (firstUnanswered !== -1) { currentIndex = firstUnanswered; renderQuestion(currentIndex); }
        }
    } else {
        currentIndex++;
        renderQuestion(currentIndex);
    }
});

resetBtn.addEventListener('click', function() {
    if (confirm('Сбросить все ответы и начать заново?')) resetTest();
});
restartBtn.addEventListener('click', resetTest);

renderQuestion(0);
</script>
</body>
</html>
